<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayNest Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="centered-page">
  <div class="card auth-card">
    <div class="brand">PayNest</div>
    <p class="subtitle">Sign in with email/password or Google to continue.</p>

    <label>Email</label>
    <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email" />

    <label>Password</label>
    <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password" />

    <div class="auth-actions">
      <button id="email-login" class="btn primary block" type="button">Login with Email</button>
      <button id="email-signup" class="btn block" type="button">Create Account</button>
    </div>

    <div class="divider"><span>or</span></div>

    <button id="google-login" class="btn ghost block" type="button">Continue with Google</button>
    <p id="auth-status" class="subtitle"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/auth.js"></script>
</body>
</html>
